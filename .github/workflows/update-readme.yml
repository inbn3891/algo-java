name: Update README

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.java'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new java files and update README
        run: python3 .github/scripts/update_readme.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet && git diff --staged --quiet || git commit -am "docs: README 자동 업데이트"
          git push